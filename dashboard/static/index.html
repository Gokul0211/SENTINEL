<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SENTINEL — LLM security middleware</title>
<meta name="description" content="Five-layer security middleware for LLM deployments. Catches prompt injections, RAG poisoning, and agentic hijacking in real time."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ——————————————————————————————————
   SENTINEL — designed by a human
   —————————————————————————————————— */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #0C0C0C;
  --dark:    #111111;
  --card:    #161616;
  --line:    #242424;
  --line2:   #2E2E2E;
  --amber:   #F59E0B;
  --amber2:  #D97706;
  --green:   #22C55E;
  --red:     #EF4444;
  --orange:  #F97316;
  --yellow:  #EAB308;
  --blue:    #60A5FA;
  --purple:  #A78BFA;
  --text:    #EBEBEB;
  --dim:     #888888;
  --faint:   #444444;
  --mono:    'JetBrains Mono', 'Consolas', monospace;
  --sys:     system-ui, -apple-system, 'Segoe UI', sans-serif;
}

html { scroll-behavior: smooth; }
html, body {
  height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: var(--sys);
  -webkit-font-smoothing: antialiased;
}

::selection { background: rgba(245,158,11,.25); color: #fff; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

/* ——— keyframes ——— */
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadein   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes loadbar  { 0%{left:-50%} 100%{left:110%} }
@keyframes marquee  { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
@keyframes liveping { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)} 100%{box-shadow:0 0 0 7px transparent} }
@keyframes slidein  { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
@keyframes bump     { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes scanflash{ 0%{opacity:.8} 100%{opacity:0} }
@keyframes typebeat { 0%,100%{opacity:1} 50%{opacity:0} }

/* ——— PRELOADER ——— */
#PL {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity .4s, visibility .4s;
}
#PL.gone { opacity: 0; visibility: hidden; }
.pl-logo { font-family: var(--mono); font-size: 16px; font-weight: 600; letter-spacing: 4px; color: var(--dim); text-transform: uppercase; }
.pl-bar  { width: 180px; height: 1px; background: var(--line); position: relative; overflow: hidden; }
.pl-bar::after { content: ''; position: absolute; top: 0; height: 100%; width: 40%; background: var(--amber); animation: loadbar 1s linear infinite; }
.pl-sub  { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: var(--faint); text-transform: uppercase; }

/* =============================================
   LANDING
   ============================================= */

#landing { position: relative; z-index: 2; }

/* nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: rgba(12,12,12,.98);
  border-bottom: 1px solid var(--line);
}
.nav-logo  { display: flex; align-items: center; gap: 9px; text-decoration: none; }
.nav-icon  { width: 24px; height: 24px; border-radius: 5px; background: var(--amber); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #000; font-family: var(--mono); }
.nav-name  { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
.nav-ver   { font-family: var(--mono); font-size: 10px; color: var(--faint); }
.nav-r     { display: flex; gap: 6px; align-items: center; }
.nav-link  { padding: 6px 12px; font-size: 12px; color: var(--dim); text-decoration: none; border-radius: 4px; transition: color .15s; font-family: var(--sys); }
.nav-link:hover { color: var(--text); }
.nav-cta   { padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: 4px; background: var(--amber); color: #000; border: none; cursor: pointer; font-family: var(--sys); transition: background .15s; }
.nav-cta:hover { background: var(--amber2); }

/* hero */
.hero {
  padding: 52px 0 0;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.hero-main {
  flex: 1; display: flex; flex-direction: column; justify-content: center;
  max-width: 860px; margin: 0 auto; padding: 64px 40px 72px;
  gap: 0;
}
.hero-eyebrow {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--faint); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: liveping 1.5s ease infinite; flex-shrink: 0; }
.hero-h1 {
  font-family: var(--mono); font-size: clamp(28px, 5vw, 52px);
  font-weight: 700; line-height: 1.12; color: var(--text);
  margin-bottom: 20px; letter-spacing: -1px;
}
.hero-h1 .hl { color: var(--amber); }
.hero-p {
  font-size: 15px; color: var(--dim); line-height: 1.75;
  max-width: 560px; margin-bottom: 36px;
}
.hero-p strong { color: var(--text); font-weight: 500; }
.hero-terminal {
  background: var(--dark); border: 1px solid var(--line);
  border-radius: 6px; overflow: hidden; margin-bottom: 32px;
  max-width: 640px;
}
.ht-bar {
  display: flex; align-items: center; gap: 6px; padding: 9px 14px;
  background: var(--card); border-bottom: 1px solid var(--line);
}
.ht-dot { width: 9px; height: 9px; border-radius: 50%; }
.ht-title { margin-left: 6px; font-family: var(--mono); font-size: 10px; color: var(--faint); }
.ht-body { padding: 14px 16px; font-family: var(--mono); font-size: 11px; line-height: 1.9; color: var(--dim); }
.ht-line .p  { color: var(--faint); }
.ht-line .cmd{ color: var(--text); }
.ht-line .out{ color: var(--amber); }
.ht-line .ok { color: var(--green); }
.ht-line .err{ color: var(--red); }
.ht-line .cmt{ color: var(--faint); }
.ht-cursor { display: inline-block; width: 7px; height: 13px; background: var(--green); vertical-align: middle; margin-left: 2px; animation: blink .9s step-end infinite; }
.hero-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.btn-primary  { padding: 10px 22px; background: var(--amber); color: #000; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sys); transition: background .15s; }
.btn-primary:hover { background: var(--amber2); }
.btn-ghost    { padding: 10px 18px; background: transparent; color: var(--dim); border: 1px solid var(--line2); border-radius: 4px; font-size: 13px; cursor: pointer; font-family: var(--sys); text-decoration: none; transition: all .15s; display: inline-block; }
.btn-ghost:hover { border-color: var(--faint); color: var(--text); }
.hero-note { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-left: 4px; }

/* legacy compat */
.btn { padding: 7px 14px; border-radius: 4px; font-size: 12px; font-weight: 500; border: none; cursor: pointer; font-family: var(--sys); transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; }
.btn-g { background: transparent; color: var(--dim); border: 1px solid var(--line2); }
.btn-g:hover { color: var(--text); border-color: var(--faint); }
.btn-p { background: var(--amber); color: #000; font-weight: 600; }
.btn-p:hover { background: var(--amber2); }
.hero-badge, .hero-eyebrow-compat { font-family: var(--mono); font-size: 10px; color: var(--faint); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.hero-grid, .hero-radial, .scroll-hint { display: none; }
.gt      { color: var(--amber); }
.gt-warm { color: var(--orange); }
.gt-cool { color: var(--green); }
.glass   { background: var(--card); border: 1px solid var(--line); }

/* tape / marquee */
.mq { padding: 11px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); overflow: hidden; background: var(--dark); }
.mq-inner { display: inline-flex; animation: marquee 40s linear infinite; white-space: nowrap; }
.mq-item  { padding: 0 28px; font-family: var(--mono); font-size: 10px; font-weight: 400; letter-spacing: 1px; color: var(--faint); text-transform: uppercase; display: inline-flex; align-items: center; gap: 20px; }
.mq-dot   { color: var(--amber); font-size: 4px; }

/* sections */
.section    { padding: 88px 0; }
.container  { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
.sec-label  { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 2px; color: var(--amber); text-transform: uppercase; margin-bottom: 14px; }
.sec-h      { font-size: clamp(24px, 3.5vw, 40px); font-weight: 700; letter-spacing: -.3px; line-height: 1.2; margin-bottom: 14px; color: var(--text); }
.sec-p      { font-size: 14px; color: var(--dim); line-height: 1.75; max-width: 480px; }

/* problem */
.problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
.attack-list  { border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
.attack-row   { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--line); transition: background .12s; }
.attack-row:last-child { border-bottom: none; }
.attack-row:hover { background: var(--dark); }
.a-icon  { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.a-text h4 { font-size: 12px; font-weight: 600; margin-bottom: 2px; color: var(--text); }
.a-text p  { font-size: 10px; color: var(--dim); line-height: 1.4; }
.a-sev  { margin-left: auto; font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: .5px; white-space: nowrap; }
.stat-trio    { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
.stat-trio-row{ display: flex; align-items: center; gap: 12px; }
.sti          { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

/* stats bar */
.stats-bar  { padding: 52px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--dark); }
.sbar-item  { flex: 1; text-align: center; padding: 16px 20px; border-right: 1px solid var(--line); }
.sbar-item:last-child { border-right: none; }
.sbar-n     { font-family: var(--mono); font-size: 34px; font-weight: 700; letter-spacing: -2px; line-height: 1; color: var(--text); }
.sbar-l     { font-size: 11px; color: var(--dim); margin-top: 5px; }

/* layers */
.layers-grid {
  display: grid; grid-template-columns: repeat(5,1fr);
  gap: 1px; background: var(--line);
  border: 1px solid var(--line); border-radius: 6px;
  overflow: hidden; margin-top: 36px;
}
.layer-card { padding: 20px 16px; background: var(--card); position: relative; transition: background .15s; }
.layer-card:hover { background: var(--dark); }
.layer-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--lc, var(--amber)); }
.lc-num   { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .5px; margin-bottom: 12px; color: var(--faint); }
.lc-icon  { font-size: 18px; margin-bottom: 10px; display: block; }
.lc-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
.lc-desc  { font-size: 10px; color: var(--dim); line-height: 1.6; }
.lc-tag   { display: inline-block; margin-top: 10px; padding: 2px 6px; border-radius: 3px; font-family: var(--mono); font-size: 8px; font-weight: 600; letter-spacing: .5px; }
.tag-live { background: rgba(34,197,94,.1); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.tag-sim  { background: rgba(245,158,11,.1); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }

/* compare */
.compare      { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; }
.compare-box  { border-radius: 6px; overflow: hidden; border: 1px solid var(--line); }
.compare-bar  { padding: 9px 14px; font-family: var(--mono); font-size: 10px; font-weight: 600; background: var(--card); border-bottom: 1px solid var(--line); }
.compare-body { padding: 14px; font-family: var(--mono); font-size: 11px; line-height: 2; background: var(--dark); color: var(--dim); }

/* cta */
.cta-section { padding: 80px 0; border-top: 1px solid var(--line); background: var(--dark); }
.cta-ghost   { display: none; }
.fchips      { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin-top: 22px; }
.fc          { padding: 4px 11px; border-radius: 3px; font-size: 11px; font-family: var(--mono); background: var(--card); border: 1px solid var(--line); color: var(--dim); }

/* hero legacy compat */
.hero-chips   { display: flex; gap: 6px; flex-wrap: wrap; }
.hchip        { padding: 3px 9px; border-radius: 3px; font-size: 10px; background: var(--card); border: 1px solid var(--line); color: var(--faint); font-family: var(--mono); }
.hero-btns    { display: flex; gap: 10px; flex-wrap: wrap; }
.hero-btns .btn { font-size: 13px; }

footer {
  text-align: left; padding: 22px 40px;
  border-top: 1px solid var(--line);
  font-family: var(--mono); font-size: 10px; color: var(--faint);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--dark);
}

/* =============================================
   DASHBOARD
   ============================================= */

#dashboard { display: none; position: relative; z-index: 2; height: 100vh; width: 100vw; overflow: hidden; background: var(--black); }
#dashboard.vis { display: flex; }

/* sidebar */
.soc-sidebar {
  width: 210px; background: var(--dark);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 12px; flex-shrink: 0;
}
.soc-sidebar-header {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 4px 14px;
  border-bottom: 1px solid var(--line); margin-bottom: 10px;
}
.soc-logo-icon { width: 24px; height: 24px; border-radius: 5px; background: var(--amber); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #000; font-family: var(--mono); }
.soc-logo-text { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
.soc-nav-list  { display: flex; flex-direction: column; gap: 1px; }
.soc-nav-item  {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: 4px;
  background: transparent; border: none;
  color: var(--dim); font-family: var(--sys); font-size: 12px;
  font-weight: 400; text-align: left; cursor: pointer; transition: all .12s; width: 100%;
}
.soc-nav-item:hover { background: var(--card); color: var(--text); }
.soc-nav-item.act   { background: rgba(245,158,11,.1); color: var(--amber); font-weight: 500; border: none; }

/* main */
.soc-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--black); }
.soc-header {
  height: 46px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; background: var(--dark); flex-shrink: 0;
}
.soc-header-title  { font-size: 12px; font-weight: 500; color: var(--dim); font-family: var(--mono); }
.soc-status-badge  {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--green);
  background: rgba(34,197,94,.08); padding: 3px 9px; border-radius: 3px;
  border: 1px solid rgba(34,197,94,.2);
}
.soc-status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: liveping 1.5s ease infinite; }
.atk-btn  { padding: 5px 12px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); border-radius: 4px; color: var(--red); font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: var(--mono); }
.atk-btn:hover { background: rgba(239,68,68,.2); }
.back-btn { padding: 5px 11px; border-radius: 4px; background: transparent; border: 1px solid var(--line); color: var(--faint); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: all .12s; }
.back-btn:hover { border-color: var(--line2); color: var(--dim); }

/* content */
.soc-content { flex: 1; display: grid; grid-template-columns: 1.8fr 1fr; gap: 10px; padding: 10px; min-height: 0; overflow: hidden; }
.soc-left-pane, .soc-right-pane { display: flex; flex-direction: column; gap: 10px; min-height: 0; overflow: hidden; }

/* cards */
.soc-card {
  background: var(--dark); border: 1px solid var(--line);
  border-radius: 6px; padding: 12px;
  display: flex; flex-direction: column; min-height: 0;
}
.soc-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.soc-card-title  { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .5px; color: var(--faint); text-transform: uppercase; }

/* metric tiles */
.soc-metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex-shrink: 0; }
.soc-metric-card  { background: var(--dark); border: 1px solid var(--line); border-radius: 6px; padding: 11px 14px; position: relative; overflow: hidden; }
.soc-metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--mc, var(--amber)); }
.soc-metric-val   { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1.2; color: var(--text); }
.soc-metric-lbl   { font-family: var(--mono); font-size: 9px; font-weight: 500; color: var(--faint); text-transform: uppercase; margin-top: 3px; letter-spacing: .5px; }

/* scan flash */
.scan-line { position: absolute; left: 0; right: 0; top: 46px; height: 1px; background: var(--red); opacity: .8; z-index: 30; animation: scanflash .5s ease forwards; }

/* ——— TERMINAL ——— */
.term { display: flex; flex-direction: column; flex: 1; min-height: 0; border-radius: 6px; overflow: hidden; border: 1px solid var(--line); background: #060606; }
.term-bar { display: flex; align-items: center; gap: 5px; padding: 7px 12px; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.td { width: 10px; height: 10px; border-radius: 50%; }
.term-title { margin-left: 6px; font-family: var(--mono); font-size: 10px; color: var(--faint); flex: 1; text-align: center; }
.term-qs { display: flex; gap: 5px; padding: 7px 10px; border-bottom: 1px solid var(--line); background: var(--dark); flex-wrap: wrap; flex-shrink: 0; }
.tq { padding: 3px 9px; border-radius: 3px; font-size: 10px; background: transparent; border: 1px solid var(--line); color: var(--faint); cursor: pointer; font-family: var(--mono); transition: all .12s; }
.tq:hover { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,.06); }
.term-body { flex: 1; overflow-y: auto; padding: 10px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.7; min-height: 0; background: #060606; }
.tl { display: flex; gap: 6px; margin-bottom: 1px; word-break: break-all; }
.blink { animation: typebeat .9s step-end infinite; }
.term-inp { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-top: 1px solid var(--line); background: var(--dark); flex-shrink: 0; }
.tp-s { font-family: var(--mono); font-size: 10px; color: var(--green); white-space: nowrap; }
.ti   { flex: 1; background: transparent; border: none; outline: none; font-family: var(--mono); font-size: 11px; color: var(--text); }
.ti::placeholder { color: var(--faint); }
.tsend { padding: 3px 10px; border-radius: 3px; background: var(--amber); border: none; color: #000; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--mono); transition: all .12s; }
.tsend:disabled { background: var(--line); color: var(--faint); cursor: not-allowed; }

/* ——— SESSION PANEL ——— */
.sp-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; flex: 1; padding: 24px; color: var(--faint); font-size: 12px; font-family: var(--mono); }
.sp-ring  { font-size: 28px; opacity: .2; }
.dlabel   { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1.5px; color: var(--faint); text-transform: uppercase; margin-bottom: 8px; }
.lh-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
.lh-k     { font-family: var(--mono); font-size: 9px; font-weight: 700; min-width: 22px; }
.lh-n     { color: var(--faint); font-size: 10px; min-width: 90px; font-family: var(--mono); }
.lh-bg    { flex: 1; height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; }
.lh-fill  { height: 100%; border-radius: 2px; transition: width .6s ease; }
.lh-v     { font-family: var(--mono); font-size: 10px; font-weight: 600; min-width: 30px; text-align: right; }
.turn-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.turn-n   { font-family: var(--mono); font-size: 9px; color: var(--faint); min-width: 20px; }
.turn-bg  { flex: 1; height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; }

.chain-step { padding: 8px 10px; border-left: 2px solid var(--line); margin-bottom: 8px; border-radius: 0 4px 4px 0; background: var(--card); }

/* ——— EVENT FEED ——— */
.feed-scroll { flex: 1; overflow-y: auto; min-height: 0; }

.feed-row    { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .1s; font-size: 11px; }
.feed-row:hover { background: var(--card); }
.feed-row.sel   { background: rgba(245,158,11,.06); border-left: 2px solid var(--amber); }
.feed-ts   { font-family: var(--mono); font-size: 9px; color: var(--faint); min-width: 58px; flex-shrink: 0; }
.feed-type { font-family: var(--mono); font-size: 10px; color: var(--dim); flex: 1; }

.sc-card  { padding: 12px 14px; border-radius: 5px; background: var(--card); border: 1px solid var(--line); margin-bottom: 9px; transition: border-color .12s; }

.sc-tag   { display: inline-block; padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .3px; margin-right: 3px; background: var(--line); color: var(--dim); border: none; }

/* ——— FORMS ——— */

.sess-float { background: none !important; border: none !important; padding: 0 !important; }
.feed-float { height: auto !important; }

function Pill({sev,sm}){const s=SEVS[sev]||SEVS.CLEAN;return h('span',{className:'pill',style:{background:s.bg,color:s.c,border:`1px solid ${s.b}`,fontSize:sm?'8px':'9px',padding:sm?'1px 5px':'2px 7px'}},sev)}

/* ═══ SENTINEL EYE ═══ */
function SentinelEye({score,flash}){

/* ═══ STATE ═══ */
const INIT={events:[],sessions:{},selected:null,stats:{active_sessions:0,counts:{CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0},blocked:0,layer_scores:{L1:0,L2:0,L3:0,L4:0,L5:0}},filter:null,demoOpen:false,terminated:null,termLog:[],running:null,flash:false};
function reducer(s,a){
  switch(a.type){
    case 'WS':{const m=a.payload;if(m.type==='THREAT_EVENT')return reducer(s,{type:'EVT',payload:m.payload});if(m.type==='STATS_UPDATE')return{...s,stats:m.payload};if(m.type==='SESSION_UPDATE')return{...s,sessions:{...s.sessions,[m.payload.session_id]:m.payload}};if(m.type==='RESET')return{...INIT};return s}
    case 'EVT':{const e=a.payload;return{...s,events:[e,...s.events].slice(0,100),flash:e.severity==='CRITICAL',terminated:e.action==='BLOCKED'?e.session_id:s.terminated,selected:e.session_id}}

    ws.onclose=()=>setTimeout(go,del.current=Math.min(del.current*1.5,10000));ws.onerror=()=>ws.close();return ws;
  },[dispatch]);
  useEffect(()=>{const ws=go();return()=>ws.close()},[go]);
}

/* ═══ TERMINAL ═══ */
function Terminal({termLog,dispatch}){
  const[input,setInput]=useState('');const[sending,setSending]=useState(false);

    h('div',{className:'term-bar'},
      h('div',{className:'td',style:{background:'#EF4444'}}),h('div',{className:'td',style:{background:'#EAB308'}}),h('div',{className:'td',style:{background:'#22C55E'}}),
      h('div',{className:'term-title'},'sentinel interceptor'),
      h('span',{style:{fontFamily:'var(--mono)',fontSize:8,color:'var(--green)',marginLeft:'auto'}},'● live'),

            h('div',{className:'tl'},h('span',{style:{color:'var(--dim)',marginLeft:14}},'sentinel v0.1 — 5-layer LLM security middleware')),
            h('div',{className:'tl',style:{marginTop:6}},h('span',{style:{color:'var(--amber)'}},'$'),h('span',{style:{color:'var(--faint)',marginLeft:6}},'sentinel listen --ws')),

/* ═══ SESSION PANEL ═══ */
function SessionPanel({session,scores,terminated}){
  const overall=session?.overall||0,turns=session?.turns||[];
  const lastExp=useMemo(()=>{if(!session?.events)return null;for(let i=session.events.length-1;i>=0;i--)if(session.events[i].explanation?.summary)return session.events[i].explanation;return null},[session]);

    terminated===session.session_id&&h('div',{style:{position:'absolute',inset:0,background:'rgba(239,68,68,.03)',border:'1px solid rgba(239,68,68,.15)',borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,zIndex:10,pointerEvents:'none',backdropFilter:'blur(2px)'}},
      h('div',{style:{fontSize:12,fontWeight:700,letterSpacing:3,color:'var(--red)',fontFamily:'var(--mono)'}},'⛔ TERMINATED'),
      h('div',{style:{fontSize:9,color:'rgba(239,68,68,.5)',fontFamily:'var(--mono)'}},'blocked by sentinel'),
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14}},

      h('span',{style:{fontFamily:'var(--mono)',fontSize:10,color:'var(--dim)'}},(session.session_id||'').slice(0,16)),
      h(Pill,{sev:session.risk||'CLEAN'}),
    ),
    h('div',{className:'dlabel',style:{marginTop:14}},'Layer Scores'),
    ...Object.entries(LAYERS).map(([k,v])=>{const sc=s[k]||0,c=gc(sc);return h('div',{key:k,className:'lh-row'},h('span',{className:'lh-k',style:{color:LC[k]}},k),h('span',{className:'lh-n'},v),h('div',{className:'lh-bg'},h('div',{className:'lh-fill',style:{width:`${sc*100}%`,background:c}})),h('span',{className:'lh-v',style:{color:c}},sc.toFixed(2)))}),

/* ═══ ROUTER ═══ */
let dashRoot=null;
function showLanding(){
  document.title='sentinel — llm security middleware';
  const ld=document.getElementById('landing'),db=document.getElementById('dashboard');
  db.classList.remove('vis');ld.style.display='block';
  ld.style.opacity='0';ld.style.transition='opacity .3s';
  buildLanding(enterDashboard);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ld.style.opacity='1'}));
  window.scrollTo({top:0,behavior:'smooth'});
}
function enterDashboard(){
  document.title='sentinel — dashboard';
  const ld=document.getElementById('landing'),db=document.getElementById('dashboard');
  ld.style.transition='opacity .25s';ld.style.opacity='0';
  setTimeout(()=>{
    ld.style.display='none';db.classList.add('vis');db.style.opacity='0';db.style.transition='opacity .3s';
    if(!dashRoot)dashRoot=ReactDOM.createRoot(db);
    dashRoot.render(h(Dashboard,{onBack:showLanding}));
    requestAnimationFrame(()=>requestAnimationFrame(()=>{db.style.opacity='1'}));
  },250);
}

setTimeout(()=>{
  document.getElementById('PL').classList.add('gone');
  showLanding();
  setTimeout(()=>{const pl=document.getElementById('PL');if(pl)pl.remove()},600);
},1600);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('dashboard').classList.contains('vis'))showLanding()});
